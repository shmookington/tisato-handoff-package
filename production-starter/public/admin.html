<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TISATO Admin Portal</title>
  <link rel="stylesheet" href="/assets/css/app.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/">
      <img src="/assets/tisato-logo-header.png" alt="TISATO Transportation Services">
    </a>
    <nav class="nav">
      <a href="/">Public Site</a>
      <button id="logoutButton" class="text-button" type="button" hidden>Log Out</button>
    </nav>
  </header>

  <main class="admin-shell">
    <section class="admin-hero">
      <p class="eyebrow">Protected Dispatch Portal</p>
      <h1>Review booking requests, update trip status, and trigger passenger notifications.</h1>
    </section>

    <section id="loginPanel" class="admin-card">
      <h2>Admin Login</h2>
      <p>Set <code>ADMIN_PASSWORD_HASH</code> before production launch. For local demos, <code>ADMIN_PASSWORD</code> may be used.</p>
      <form id="loginForm" class="booking-form compact-form">
        <label>
          Admin email
          <input name="email" type="email" autocomplete="username" required>
        </label>
        <label>
          Password
          <input name="password" type="password" autocomplete="current-password" required>
        </label>
        <button class="button primary" type="submit">Log In</button>
        <p id="loginMessage" class="form-message" role="status"></p>
      </form>
    </section>

    <section id="dashboardPanel" class="admin-card" hidden>
      <div class="dashboard-head">
        <div>
          <p class="eyebrow">Operations</p>
          <h2>Booking Queue</h2>
        </div>
        <button id="refreshButton" class="button secondary" type="button">Refresh</button>
      </div>
      <div id="metrics" class="metric-grid"></div>
      <div id="bookingTable" class="booking-table"></div>
      <p id="dashboardMessage" class="form-message" role="status"></p>
    </section>
  </main>

  <script src="/assets/js/admin.js" type="module"></script>
</body>
</html>
